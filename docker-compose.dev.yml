# docker-compose.dev.yml — local dev data services only
# Spins up Neo4j + Qdrant (local) for development and testing.
# No Ollama, backend, or frontend — those run directly on the host.
#
# Usage:
#   docker compose -f docker-compose.dev.yml up -d
#   docker compose -f docker-compose.dev.yml down

version: "3.9"

services:
  # ── Qdrant (local, replaces Qdrant Cloud for dev/test) ───────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: dyslearnia-qdrant
    ports:
      - "6333:6333"   # REST API  — http://localhost:6333
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:6333/healthz"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── Neo4j ─────────────────────────────────────────────────────────────────
  neo4j:
    image: neo4j:5
    container_name: dyslearnia-neo4j
    ports:
      - "7474:7474"   # Neo4j Browser — http://localhost:7474
      - "7687:7687"   # Bolt protocol
    volumes:
      - neo4j_data:/data
    environment:
      NEO4J_AUTH: neo4j/dyslearnia
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1G
    healthcheck:
      test: ["CMD", "wget", "-O-", "-q", "http://localhost:7474"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

volumes:
  qdrant_data:
  neo4j_data:
